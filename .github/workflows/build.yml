name: Build Aegis APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Change App Name and Icon
        run: |
          # עדכון שם האפליקציה ב-strings.xml
          sed -i 's/And App/Aegis/g' app/src/main/res/values/strings.xml
          
          # הורדת הלוגו החדש והחלפתו (בהנחה שזה ic_launcher)
          curl -L "https://ibb.co/VWKpJDgN" -o app/src/main/res/mipmap-xxxhdpi/ic_launcher.png

      - name: Build with Gradle
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Aegis-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
