name: Build Aegis APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Update App Name and Home Screen Icon
        run: |
          # עדכון שם האפליקציה ל-Aegis
          find . -name "strings.xml" -exec sed -i 's/Android App/Aegis/g' {} + || true
          
          # הורדת הלוגו החדש למסך הבית (Launcher Icon)
          # משתמש בקישור ישיר לקובץ התמונה כדי למנוע שגיאות
          ICON_URL="https://i.ibb.co/6809XW6/image.png"
          
          # החלפת האייקון בכל התיקיות הרלוונטיות
          curl -L "$ICON_URL" -o app/src/main/res/mipmap-xxxhdpi/ic_launcher.png || true
          curl -L "$ICON_URL" -o app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png || true
          # גיבוי למקרה שהתיקיות בנתיב אחר
          curl -L "$ICON_URL" -o app/src/main/res/drawable/ic_launcher.png || true

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Aegis-App
          path: app/build/outputs/apk/debug/*.apk
