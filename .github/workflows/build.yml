name: Build Aegis APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Update App Name and Icon
        run: |
          # מחפש את קובץ ה-strings ומשנה את השם ל-Aegis
          find . -name "strings.xml" -exec sed -i 's/Android App/Aegis/g' {} + || true
          
          # הורדת הלוגו החדש למסך הבית (Direct Link)
          ICON_URL="https://i.ibb.co/6809XW6/image.png"
          find . -name "ic_launcher.png" -exec curl -L "$ICON_URL" -o {} \; || true
          find . -name "ic_launcher_round.png" -exec curl -L "$ICON_URL" -o {} \; || true

      - name: Grant execute permission for gradlew
        run: find . -name "gradlew" -exec chmod +x {} \;

      - name: Build with Gradle
        run: |
          # מחפש את קובץ ה-gradlew ומריץ אותו מאיפה שהוא נמצא
          GRADLEW_PATH=$(find . -name "gradlew" | head -n 1)
          if [ -z "$GRADLEW_PATH" ]; then
            echo "Error: gradlew not found!"
            exit 1
          fi
          $GRADLEW_PATH assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Aegis-App
          path: "**/build/outputs/apk/debug/*.apk"
