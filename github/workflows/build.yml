name: Build Aegis Browser

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate Android Project Structure
        run: |
          # יצירת מבנה תיקיות
          mkdir -p app/src/main/java/com/refael/aegis
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/mipmap-xxxhdpi

          # 1. יצירת המניפסט
          cat <<EOF > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.refael.aegis">
              <uses-permission android:name="android.permission.INTERNET" />
              <application android:label="Aegis" android:icon="@mipmap/ic_launcher" android:theme="@style/Theme.AppCompat.Light.NoActionBar" android:usesCleartextTraffic="true">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # 2. יצירת קוד ה-Java (דפדפן עם שורת כתובת בסיסית)
          cat <<EOF > app/src/main/java/com/refael/aegis/MainActivity.java
          package com.refael.aegis;
          import android.os.Bundle;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import androidx.appcompat.app.AppCompatActivity;
          public class MainActivity extends AppCompatActivity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  WebView webView = new WebView(this);
                  webView.getSettings().setJavaScriptEnabled(true);
                  webView.setWebViewClient(new WebViewClient());
                  webView.loadUrl("https://www.google.com");
                  setContentView(webView);
              }
          }
          EOF

          # 3. יצירת קבצי הגדרות (build.gradle)
          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.0' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.refael.aegis'
              compileSdk 34
              defaultConfig { applicationId "com.refael.aegis"; minSdk 24; targetSdk 34; versionCode 1; versionName "1.0" }
          }
          dependencies { implementation 'androidx.appcompat:appcompat:1.6.1' }
          EOF

          cat <<EOF > settings.gradle
          include ':app'
          EOF

          # 4. הורדת הלוגו
          curl -L "https://i.ibb.co/6809XW6/image.png" -o app/src/main/res/mipmap-xxxhdpi/ic_launcher.png

      - name: Build APK
        run: |
          gradle wrapper
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Aegis-Final-App
          path: app/build/outputs/apk/debug/*.apk
